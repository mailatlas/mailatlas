name: Feature request
description: Suggest an improvement for MailAtlas.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior or interface you want.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Fixtures, providers, storage assumptions, or downstream tools involved.
