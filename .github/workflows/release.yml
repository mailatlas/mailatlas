name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/mailatlas/
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
      - name: Build distribution artifacts
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Render Homebrew formula
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: |
          mkdir -p release-assets
          python scripts/render_homebrew_formula.py \
            --owner "$GITHUB_OWNER" \
            --version "${GITHUB_REF_NAME#v}" \
            --sdist dist/mailatlas-${GITHUB_REF_NAME#v}.tar.gz \
            --output release-assets/mailatlas.rb
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
            release-assets/mailatlas.rb
      - name: Detect Homebrew tap publishing config
        id: homebrew-config
        env:
          HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "$HOMEBREW_TAP_REPOSITORY" ] && [ -n "$HOMEBREW_TAP_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Check out Homebrew tap
        if: steps.homebrew-config.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Publish formula to Homebrew tap
        if: steps.homebrew-config.outputs.enabled == 'true'
        run: |
          mkdir -p homebrew-tap/Formula
          cp release-assets/mailatlas.rb homebrew-tap/Formula/mailatlas.rb
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/mailatlas.rb
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "mailatlas ${GITHUB_REF_NAME}"
          git push
