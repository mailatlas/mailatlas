name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: make PYTHON=python bootstrap-python
      - name: Run tests with coverage
        run: |
          coverage run --source=mailatlas -m unittest discover -s tests -v
          coverage report --fail-under=82

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
      - name: Install package
        run: make PYTHON=python bootstrap-python
      - name: Smoke check wheel and sdist
        run: make PYTHON=python smoke-release
